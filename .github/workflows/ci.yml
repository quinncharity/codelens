name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Install (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Proto lint
        run: pnpm lint:proto

      - name: Codegen
        run: pnpm codegen

      - name: Ensure codegen is clean
        run: git diff --exit-code

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test
