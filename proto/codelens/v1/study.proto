syntax = "proto3";

package codelens.v1;

// Lightweight logging service for user-study interaction tracking.
// Accepts batched events from the frontend to minimise network chatter.
service StudyService {
  // Accept a batch of interaction events (fire-and-forget from the client).
  rpc LogEvents(LogEventsRequest) returns (LogEventsResponse);
}

// A single user-interaction event captured by the frontend tracker.
message InteractionEvent {
  string user_id = 1;
  string session_id = 2;
  string event_type = 3; // click, zoom_in, zoom_out, expand, collapse, dwell
  string target_element_id = 4;
  int64 timestamp_ms = 5; // Unix epoch milliseconds
  int32 duration_ms = 6; // reading / dwell time (0 when not applicable)
  string metadata_json = 7; // optional JSON blob for extra context
}

message LogEventsRequest {
  repeated InteractionEvent events = 1;
}

message LogEventsResponse {
  int32 accepted_count = 1;
}
