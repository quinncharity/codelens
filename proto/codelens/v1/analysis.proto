syntax = "proto3";

package codelens.v1;

// Stable, minimal v1 API: start analysis, stream progress, fetch result.
service AnalysisService {
  // Fire-and-forget: starts a job and returns an id.
  rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse);

  // Convenience: starts a job and streams progress until completion.
  rpc AnalyzeStream(AnalyzeStreamRequest) returns (stream AnalyzeStreamResponse);

  // Fetch a stored analysis result by id.
  rpc GetAnalysis(GetAnalysisRequest) returns (GetAnalysisResponse);

  // Fetch annotated source code for a specific file in an analysis.
  rpc GetFileSource(GetFileSourceRequest) returns (GetFileSourceResponse);

  // List distinct repositories that have been analyzed (grouped by git_url + ref),
  // returning the latest analysis per repo/ref.
  rpc ListRepos(ListReposRequest) returns (ListReposResponse);

  // Delete all analyses for a specific repository and ref.
  rpc DeleteRepo(DeleteRepoRequest) returns (DeleteRepoResponse);
}

message AnalyzeRequest {
  string git_url = 1;
  string ref = 2; // optional branch/tag/sha
}

message AnalyzeResponse {
  string id = 1;
}

message AnalyzeStreamRequest {
  string git_url = 1;
  string ref = 2; // optional branch/tag/sha
}

message AnalyzeStreamResponse {
  string id = 1;
  string phase = 2; // CLONE, INDEX, ANALYZE, STORE, DONE, ERROR
  float progress = 3; // 0..1
  string message = 4;
  // Optional structured metadata for richer UIs/debugging. Old clients ignore.
  string agent = 5; // e.g. engine, summary, frameworks, patterns, insights
  string kind = 6; // e.g. AGENT_START, LM_START, TOOL_START, WARN, ERROR
  int32 step = 7; // optional; 1-based position within step_total (0 = unset)
  int32 step_total = 8; // optional; total steps in the current sequence (0 = unset)
}

message GetAnalysisRequest {
  string id = 1;
}

message GetAnalysisResponse {
  string id = 1;
  string git_url = 2;
  string ref = 3;

  string summary = 4;
  repeated Framework frameworks = 5;
  repeated Pattern patterns = 6;
  repeated Insight insights = 7;

  string status = 8; // SUCCEEDED, FAILED, RUNNING
  string error = 9;

  repeated ServiceModule services = 10;
}

message ListReposRequest {
  // Optional pagination. Server may clamp values for safety.
  int32 limit = 1;
  int32 offset = 2;
}

message ListReposResponse {
  repeated RepoSummary repos = 1;
}

message RepoSummary {
  string git_url = 1;
  string ref = 2;
  string last_analysis_id = 3;
  string last_status = 4; // RUNNING, SUCCEEDED, FAILED
  string last_updated_at = 5; // ISO8601 UTC timestamp
}

message DeleteRepoRequest {
  string git_url = 1;
  string ref = 2;
}

message DeleteRepoResponse {
  int32 deleted_count = 1;
}

message Framework {
  string name = 1;
  string version = 2;
  string category = 3; // web, testing, orm, build, etc.
  float confidence = 4;
}

message Pattern {
  string name = 1;
  string description = 2;
  repeated string evidence_paths = 3;
  float confidence = 4;
  // Category for grouping in the UI.
  // Allowed: architecture, implementation, quality, ai_rule, unknown.
  string category = 5;
}

message Insight {
  string category = 1; // architecture, quality, risk
  string title = 2;
  string description = 3;
}

message FileDetail {
  string path = 1;
  string purpose = 2;
  // Architectural layer: presentation, business, data, config, test, infra, unknown.
  string layer = 3;
}

message ServiceModule {
  string name = 1;
  string description = 2;
  // Type of module: service, module, package, library.
  string module_type = 3;
  repeated string entry_points = 4;
  repeated FileDetail key_files = 5;
  // Names of other ServiceModules this one depends on.
  repeated string depends_on = 6;
  // Functions/methods extracted from key files (populated by functions agent).
  repeated FunctionDetail functions = 7;
}

// A function or method extracted from source code with an AI-generated
// subgoal label explaining its purpose in plain language.
message FunctionDetail {
  string name = 1;
  string signature = 2; // e.g. "def process_order(self, order_id: int) -> Order"
  string file_path = 3; // repo-relative path
  int32 start_line = 4;
  int32 end_line = 5;
  // AI-generated subgoal label: 1-2 sentence plain-English explanation
  // of what this function does (educational scaffolding).
  string purpose = 6;
  // Complexity indicator: simple, moderate, complex.
  string complexity = 7;
}

// Request/response for fetching annotated source code of a single file.
message GetFileSourceRequest {
  string analysis_id = 1;
  string file_path = 2; // repo-relative path
}

message GetFileSourceResponse {
  string file_path = 1;
  string language = 2; // e.g. "python", "typescript"
  string source = 3; // raw source code
  // Annotated regions within this file (functions with subgoal labels).
  repeated FunctionDetail functions = 4;
  int32 total_lines = 5;
}
